<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Join Us - Equipment Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .form-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: white;
            overflow: hidden;
        }
        .form-header {
            background: #0d6efd;
            padding: 30px;
            color: white;
            text-align: center;
        }
        .form-label {
            font-weight: 700;
            color: #495057;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #f1f3f5;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: none;
            transform: translateY(-2px);
        }
        .btn-join {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            background: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-join:hover {
            background: #0b5ed7;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        .section-title {
            font-size: 1rem;
            color: #0d6efd;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e9ecef;
            margin-left: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="form-card">
                <div class="form-header">
                    <h3 class="fw-bold mb-1">Create Account</h3>
                    <p class="mb-0 opacity-75 small">회원정보를 입력해주세요</p>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/members/add}" method="post">

                        <div class="section-title">Account Info</div>

                        <div class="mb-3">
                            <label class="form-label">로그인 ID</label>
                            <input type="text" name="loginId" class="form-control" placeholder="아이디를 입력하세요" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">비밀번호</label>
                                <input type="password" name="password" class="form-control"
                                       placeholder="8~16자, 영문/숫자/특수문자 포함"
                                       pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,16}$"
                                       title="비밀번호는 8~16자이며, 영문 대소문자, 숫자, 특수문자를 모두 포함해야 합니다."
                                       required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">비밀번호 확인</label>
                                <input type="password" name="passwordConfirm" class="form-control" placeholder="Confirm" required>
                            </div>
                        </div>

                        <div class="section-title mt-4">Personal Info</div>

                        <div class="mb-3">
                            <label class="form-label">이름</label>
                            <input type="text" name="name" class="form-control" placeholder="이름을 입력하세요" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">이메일</label>
                            <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">주소</label>
                            <input type="text" name="address" class="form-control" placeholder="배송받을 주소를 입력하세요" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-join w-100 mt-2">가입하기</button>

                        <div class="text-center mt-4">
                            <a th:href="@{/}" class="text-decoration-none small text-muted">홈으로 돌아가기</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:if="${errorMessage}">
    alert([[${errorMessage}]]);
</script>

</body>
</html>
