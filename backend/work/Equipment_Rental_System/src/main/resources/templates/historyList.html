<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대여 이력 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-hover tbody tr:hover { background-color: #f8f9fa; }
        .badge { font-size: 0.9em; }
    </style>
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark">📋 전체 대여 이력 목록</h2>
    <div class="btn-group">
        <a href="/equipments" class="btn btn-outline-secondary">장비 목록으로</a>
        <a href="/rentals/new" class="btn btn-primary">신규 대여 신청</a>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th>번호</th>
                <th>장비명</th>
                <th>S/N</th>
                <th>대여자</th>
                <th>대여일시</th>
                <th>반납일시</th>
                <th>상태 및 작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${histories}">
                <td th:text="${h.id}">1</td>
                <td th:text="${h.equipmentName}" class="fw-bold text-start">장비명</td>
                <td><code th:text="${h.serialNumber}">S/N</code></td>
                <td th:text="${h.memberName}">대여자</td>
                <td th:text="${h.rentalDate}">2026-03-07 10:00</td>
                <td th:text="${h.returnDate != null ? h.returnDate : '-'}">-</td>
                <td>
                    <span th:text="${h.historyStatus}"
                          th:classappend="${h.historyStatus == '대여 중'} ? 'badge bg-warning text-dark' : 'badge bg-success'">
                        상태
                    </span>

                    <div class="mt-2">
                        <div th:if="${h.historyStatus == '대여 중'}">
                            <form th:action="@{/rentals/return/{id}(id=${h.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-primary py-1">반납하기</button>
                            </form>
                        </div>

                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(histories)}">
                <td colspan="7" class="text-center py-5 text-muted">대여 이력이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
