<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대여 이력 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">📋 전체 대여 이력 목록</h2>

<table class="table table-striped table-hover border">
    <thead class="table-dark">
    <tr>
        <th>번호</th>
        <th>장비명</th>
        <th>S/N</th>
        <th>대여자</th>
        <th>대여일시</th>
        <th>반납일시</th>
        <th>상태</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="h : ${histories}">
        <td th:text="${h.id}">1</td>
        <td th:text="${h.equipmentName}">장비명</td>
        <td th:text="${h.serialNumber}">S/N</td>
        <td th:text="${h.memberName}">이름</td>
        <td th:text="${h.rentalDate}">2026-03-07</td>
        <td th:text="${h.returnDate}">-</td>
        <td>
                    <span th:text="${h.historyStatus}"
                          th:classappend="${h.historyStatus == '대여 중'} ? 'badge bg-warning' : 'badge bg-success'">
                        상태
                    </span>
        </td>
    </tr>
    </tbody>
</table>

<div class="mt-3">
    <a href="/" class="btn btn-secondary">메인으로 돌아가기</a>
</div>

</body>
</html>
