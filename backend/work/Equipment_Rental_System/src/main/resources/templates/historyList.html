<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장비 대여 이력 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; }
        .table-hover tbody tr:hover { background-color: #f1f3f5; }
        .badge { font-size: 0.85em; padding: 0.5em 0.8em; }

        /* 버튼 줄바꿈 방지 및 스타일 최적화 */
        .btn-nowrap {
            white-space: nowrap; /* 글자 줄바꿈 절대 방지 */
            min-width: 90px;     /* 버튼 최소 너비 확보 */
        }

        /* 테이블 열 너비 조정 */
        .col-action { min-width: 130px; }
        .card { border-radius: 12px; border: none; }
        .table thead { border-radius: 12px 12px 0 0; }

        /* SweetAlert2 커스텀 스타일 */
        .swal2-select { width: 80% !important; margin: 10px auto !important; border-radius: 8px; }
        .swal2-input { width: 80% !important; margin: 10px auto !important; border-radius: 8px; }
    </style>
</head>
<body class="container mt-5 pb-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold text-dark mb-1">📋 대여 이력 관리</h2>
        <p class="text-muted small mb-0">전체 장비의 대여 및 반납 이력을 한눈에 확인하세요.</p>
    </div>
    <div class="btn-group shadow-sm">
        <a href="/equipments" class="btn btn-outline-secondary">장비 목록</a>
        <button type="button" class="btn btn-primary fw-bold" onclick="showRentalPopup()">
            🚀 신규 대여 신청
        </button>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th style="width: 80px;">번호</th>
                <th>장비명</th>
                <th>S/N</th>
                <th>대여자</th>
                <th>대여일시</th>
                <th>반납일시</th>
                <th class="col-action">상태 및 작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${histories}">
                <td th:text="${h.id}">1</td>
                <td th:text="${h.equipmentName}" class="fw-bold text-start ps-4">장비명</td>
                <td><code th:text="${h.serialNumber}" class="text-primary">S/N</code></td>
                <td th:text="${h.memberName}">홍길동</td>
                <td th:text="${h.rentalDate}">2026-03-08 10:00</td>
                <td th:text="${h.returnDate != null ? h.returnDate : '-'}">-</td>
                <td>
                    <span th:text="${h.historyStatus}"
                          th:classappend="${h.historyStatus == '대여 중'} ? 'badge bg-warning text-dark' : 'badge bg-success'">
                        상태
                    </span>

                    <div class="mt-2" th:if="${h.historyStatus == '대여 중'}">
                        <form th:action="@{/rentals/return/{id}(id=${h.id})}" method="post"
                              onsubmit="return confirmReturn(this);" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-primary px-3 btn-nowrap">
                                반납하기
                            </button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(histories)}">
                <td colspan="7" class="text-center py-5 text-muted">
                    <i class="bi bi-info-circle d-block mb-2 fs-4"></i>
                    아직 기록된 대여 이력이 없습니다.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<form id="hiddenRentalForm" th:action="@{/rentals/new}" method="post" style="display:none;">
    <input type="hidden" name="itemId" id="hiddenItemId">
    <input type="hidden" name="memberName" id="hiddenMemberName">
</form>

<script th:inline="javascript">
    /*<![CDATA[*/
    // 1. 컨트롤러에서 넘겨준 대여 가능 아이템 목록
    const availableItems = [[${items}]];

    // 2. 신규 대여 팝업 실행 함수
    async function showRentalPopup() {
        if (!availableItems || availableItems.length === 0) {
            Swal.fire({
                icon: 'warning',
                title: '재고 없음',
                text: '현재 대여 가능한 장비가 하나도 없습니다.',
                confirmButtonColor: '#0d6efd'
            });
            return;
        }

        // 아이템 리스트를 팝업용 옵션 객체로 변환
        const itemOptions = {};
        availableItems.forEach(item => {
            itemOptions[item.id] = `${item.equipmentName} (${item.serialNumber})`;
        });

        const { value: formValues } = await Swal.fire({
            title: '🚀 신규 대여 신청',
            html:
                '<div class="text-start mb-2" style="margin-left:10%; font-weight:bold; color:#555;">장비 선택</div>' +
                '<select id="swal-item" class="swal2-select">' +
                Object.entries(itemOptions).map(([id, text]) => `<option value="${id}">${text}</option>`).join('') +
                '</select>' +
                '<div class="text-start mb-2" style="margin-left:10%; font-weight:bold; color:#555;">대여자 성함</div>' +
                '<input id="swal-member" class="swal2-input" placeholder="실명을 입력하세요">',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '대여 확정',
            cancelButtonText: '취소',
            confirmButtonColor: '#0d6efd',
            preConfirm: () => {
                const itemId = document.getElementById('swal-item').value;
                const memberName = document.getElementById('swal-member').value;
                if (!memberName || memberName.trim() === "") {
                    Swal.showValidationMessage('대여자 성함을 반드시 입력해주세요.');
                    return false;
                }
                return { itemId, memberName };
            }
        });

        // 폼 제출 처리
        if (formValues) {
            document.getElementById('hiddenItemId').value = formValues.itemId;
            document.getElementById('hiddenMemberName').value = formValues.memberName;
            document.getElementById('hiddenRentalForm').submit();
        }
    }

    // 3. 반납 확인창 (SweetAlert2)
    function confirmReturn(form) {
        Swal.fire({
            title: '장비를 반납하시겠습니까?',
            text: "확인 버튼을 누르면 즉시 가용 상태로 변경됩니다.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#0d6efd',
            cancelButtonColor: '#6c757d',
            confirmButtonText: '네, 반납합니다',
            cancelButtonText: '취소'
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit();
            }
        });
        return false; // 브라우저 기본 제출 방지
    }

    // 4. 성공/실패 메시지 알림 (FlashAttributes 처리)
    const message = [[${message}]];
    const error = [[${error}]];

    if (message) {
        Swal.fire({ icon: 'success', title: '완료', text: message, timer: 2000, showConfirmButton: false });
    }
    if (error) {
        Swal.fire({ icon: 'error', title: '실패', text: error, confirmButtonColor: '#dc3545' });
    }
    /*]]>*/
</script>

</body>
</html>
