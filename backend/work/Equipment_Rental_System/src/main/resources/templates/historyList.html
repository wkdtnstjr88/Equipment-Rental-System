<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장비 대여 이력</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 1200px; padding-top: 50px; }
        .history-card { background: white; border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .badge-rented { background-color: #e7f1ff; color: #0d6efd; font-weight: 600; }
        .badge-returned { background-color: #f8f9fa; color: #6c757d; font-weight: 600; }
        .table thead { background-color: #f1f3f5; }
        /* 페이징 버튼 스타일 커스텀 */
        .pagination .page-link { color: #495057; border: none; padding: 0.5rem 0.8rem; margin: 0 2px; border-radius: 6px; }
        .pagination .page-item.active .page-link { background-color: #0d6efd; color: white; }
        .pagination .page-item.disabled .page-link { color: #ced4da; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="fw-bold mb-1">📜 장비 대여 이력</h2>
            <p class="text-muted mb-0">조건을 선택하고 키워드를 입력하여 검색하세요.</p>
        </div>

        <div class="d-flex gap-2">
            <form th:action="@{/rentals/history}" method="get" id="searchForm" class="d-flex gap-1 align-items-center">
                <select name="searchType" id="searchType" class="form-select form-select-sm" style="width: 130px;">
                    <option value="equipmentName" th:selected="${searchType == 'equipmentName'}">장비명</option>
                    <option value="serialNumber" th:selected="${searchType == 'serialNumber'}">시리얼 번호</option>
                    <option value="memberName" th:selected="${searchType == 'memberName'}">대여자</option>
                    <option value="rentalDate" th:selected="${searchType == 'rentalDate'}">대여일</option>
                    <option value="returnDate" th:selected="${searchType == 'returnDate'}">반납일</option>
                    <option value="status" th:selected="${searchType == 'status'}">상태</option>
                </select>

                <input type="text" id="keywordText" th:value="${keyword}"
                       class="form-control form-control-sm" placeholder="검색어 입력..."
                       style="width: 180px;">

                <input type="date" id="keywordDate"
                       class="form-control form-control-sm"
                       style="display: none; width: 180px;">

                <input type="hidden" name="keyword" id="realKeyword">

                <button type="submit" class="btn btn-sm btn-dark px-3">검색</button>
            </form>
            <a href="/equipments" class="btn btn-outline-dark px-4 btn-sm d-flex align-items-center">💻 장비 목록</a>
        </div>
    </div>

    <div class="card history-card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th class="py-3 ps-4">ID</th>
                    <th class="py-3">장비명</th>
                    <th class="py-3">시리얼 번호</th>
                    <th class="py-3">대여자</th>
                    <th class="py-3">대여일</th>
                    <th class="py-3">반납일</th>
                    <th class="py-3">상태</th>
                    <th class="py-3 text-center pe-4">신청</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(histories)}">
                    <td colspan="8" class="text-center py-5 text-muted">대여 이력이 존재하지 않습니다.</td>
                </tr>

                <tr th:each="history : ${histories}">
                    <td class="py-3 ps-4 text-muted" th:text="${history.id}">1</td>
                    <td class="py-3 fw-bold" th:text="${history.equipmentName}">장비명</td>
                    <td class="py-3 font-monospace text-secondary" th:text="${history.serialNumber}">SN-0000</td>
                    <td class="py-3" th:text="${history.memberName}">홍길동</td>
                    <td class="py-3 text-muted small" th:text="${history.rentalDate}">2026-03-08</td>
                    <td class="py-3 text-muted small" th:text="${history.returnDate}">-</td>

                    <td class="py-3">
                        <span class="badge px-3 py-2"
                              th:classappend="${history.historyStatus == '대여 중'} ? 'badge-rented' : 'badge-returned'"
                              th:text="${history.historyStatus}">대여 중</span>
                    </td>

                    <td class="py-3 text-center pe-4">
                        <div class="d-flex justify-content-center gap-2">
                            <form th:if="${history.historyStatus == '대여 중'}"
                                  th:action="@{/rentals/return/{id}(id=${history.id})}"
                                  method="post" class="mb-0">
                                <button type="submit" class="btn btn-sm btn-outline-danger px-3"
                                        onclick="return confirm('반납하시겠습니까?')">반납</button>
                            </form>
                            <button type="button" class="btn btn-sm btn-primary px-3"
                                    data-bs-toggle="modal" data-bs-target="#rentalModal">대여하기</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white border-0 py-4" th:if="${page.totalPages > 0}">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/rentals/history(page=0, searchType=${searchType}, keyword=${keyword})}">&laquo;&laquo;</a>
                    </li>
                    <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
                        <a class="page-link" th:href="@{/rentals/history(page=${page.number - 1}, searchType=${searchType}, keyword=${keyword})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="idx : ${#numbers.sequence(0, page.totalPages - 1)}"
                        th:classappend="${idx == page.number} ? 'active'">
                        <a class="page-link" th:href="@{/rentals/history(page=${idx}, searchType=${searchType}, keyword=${keyword})}" th:text="${idx + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
                        <a class="page-link" th:href="@{/rentals/history(page=${page.number + 1}, searchType=${searchType}, keyword=${keyword})}">&raquo;</a>
                    </li>
                    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/rentals/history(page=${page.totalPages - 1}, searchType=${searchType}, keyword=${keyword})}">&raquo;&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="rentalModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold">새 장비 대여 신청</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/rentals/new}" method="post">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">대여 가능 장비 선택</label>
                        <select name="itemId" class="form-select" required>
                            <option value="">장비를 선택해주세요</option>
                            <option th:each="item : ${items}"
                                    th:value="${item.id}"
                                    th:text="${'[' + item.equipmentName + '] ' + item.serialNumber}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">대여자 성함</label>
                        <input type="text" name="memberName" class="form-control" placeholder="실명을 입력해 주세요" required>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-modal="modal">취소</button>
                    <button type="submit" class="btn btn-primary px-4">신청 완료</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const message = [[${message}]];
        const errorMessage = [[${errorMessage}]];
        if (message) alert(message);
        if (errorMessage) alert(errorMessage);

        const searchType = document.getElementById('searchType');
        const keywordText = document.getElementById('keywordText');
        const keywordDate = document.getElementById('keywordDate');
        const searchForm = document.getElementById('searchForm');
        const realKeyword = document.getElementById('realKeyword');

        function updateInputDisplay() {
            const value = searchType.value;
            if (value === 'rentalDate' || value === 'returnDate') {
                keywordText.style.display = 'none';
                keywordDate.style.display = 'block';
            } else {
                keywordText.style.display = 'block';
                keywordDate.style.display = 'none';
            }
        }

        searchType.addEventListener('change', updateInputDisplay);
        updateInputDisplay(); // 초기 로드 시 실행

        searchForm.addEventListener('submit', function() {
            realKeyword.value = (keywordDate.style.display === 'block') ? keywordDate.value : keywordText.value;
        });
    });
</script>
</body>
</html>
