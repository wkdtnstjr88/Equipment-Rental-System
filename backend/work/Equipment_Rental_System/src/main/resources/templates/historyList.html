<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대여 이력 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-hover tbody tr:hover { background-color: #f8f9fa; }
        .badge { font-size: 0.9em; }
    </style>
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>📋 전체 대여 이력 목록</h2>
    <a href="/rentals/new" class="btn btn-primary">신규 대여 신청</a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th>번호</th>
                <th>장비명</th>
                <th>S/N</th>
                <th>대여자</th>
                <th>대여일시</th>
                <th>반납일시</th>
                <th class="text-center">상태 및 작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${histories}">
                <td th:text="${h.id}">1</td>
                <td th:text="${h.equipmentName}" class="fw-bold">장비명</td>
                <td><code th:text="${h.serialNumber}">S/N</code></td>
                <td th:text="${h.memberName}">대여자</td>
                <td th:text="${h.rentalDate}">2026-03-07 10:00</td>
                <td th:text="${h.returnDate}">-</td>
                <td class="text-center">
                            <span th:text="${h.historyStatus}"
                                  th:classappend="${h.historyStatus == '대여 중'} ? 'badge bg-warning text-dark' : 'badge bg-success'">
                                상태
                            </span>

                    <div th:if="${h.historyStatus == '반납 완료'}" class="mt-2">
                        <div th:if="${h.modelAvailable}">
                            <a th:href="@{/rentals/new(equipmentId=${h.equipmentId})}"
                               class="btn btn-sm btn-outline-success">지금 대여하기</a>
                        </div>

                        <div th:if="${!h.modelAvailable}">
                            <span class="badge bg-secondary">모델 품절</span>
                        </div>
                    </div>

                    <div th:if="${h.historyStatus == '대여 중'}" class="mt-2">
                        <button class="btn btn-sm btn-outline-primary" disabled>반납하기</button>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(histories)}">
                <td colspan="7" class="text-center py-5 text-muted">대여 이력이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="mt-4 text-end text-muted small">
    ※ 혈당 목표: 5.6 | 시스템 상태: 정상 운영 중
</div>

</body>
</html>
