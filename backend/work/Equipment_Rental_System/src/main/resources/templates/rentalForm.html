<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장비 대여 신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { border-radius: 15px; overflow: hidden; }
        .form-select-lg, .form-control-lg { font-size: 1rem; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6"> <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center py-4">
                <h4 class="mb-0 fw-bold">🚀 신규 대여 신청</h4>
            </div>

            <div class="card-body p-4">
                <form th:action="@{/rentals/new}" method="post">

                    <div class="mb-4">
                        <label for="itemId" class="form-label fw-bold text-secondary">대여 가능한 장비 선택</label>
                        <select id="itemId" name="itemId" class="form-select form-select-lg border-primary" required>
                            <option value="" th:selected="${items.size() != 1}">-- 대여할 장비를 선택해주세요 --</option>

                            <option th:each="item : ${items}"
                                    th:value="${item.id}"
                                    th:text="|${item.equipmentName} (${item.serialNumber})|"
                                    th:selected="${items.size() == 1}"> 장비명 (S/N)
                            </option>
                        </select>

                        <div th:if="${#lists.isEmpty(items)}" class="form-text text-danger fw-bold mt-2">
                            ⚠️ 현재 대여 가능한 재고가 없습니다.
                        </div>
                        <div th:unless="${#lists.isEmpty(items)}" class="form-text">
                            목록에 없는 장비는 현재 모두 대여 중입니다.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="memberName" class="form-label fw-bold text-secondary">대여자 성함</label>
                        <input type="text" id="memberName" name="memberName"
                               class="form-control form-control-lg"
                               placeholder="실명을 입력하세요" required>
                    </div>

                    <hr class="my-4">

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/equipments" class="btn btn-light btn-lg border px-4 me-md-2">취소</a>
                        <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold"
                                th:disabled="${#lists.isEmpty(items)}">
                            대여 확정하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
