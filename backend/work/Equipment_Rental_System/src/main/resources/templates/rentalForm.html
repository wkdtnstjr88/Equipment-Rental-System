<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장비 대여 신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0">🚀 신규 대여 신청</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/rentals/new}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-bold">대여 가능 장비 선택</label>
                            <select name="itemId" class="form-select" required>
                                <option value="" th:selected="${selectedItemId == null}">-- 장비를 선택해주세요 --</option>

                                <option th:each="item : ${items}"
                                        th:value="${item.id}"
                                        th:text="|${item.equipmentName} (${item.serialNumber})|"
                                        th:selected="${item.id == selectedItemId}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">대여자 성함</label>
                            <input type="text" name="memberName" class="form-control" placeholder="성함을 입력하세요" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">대여 확정</button>
                            <a href="/rentals/history" class="btn btn-link text-secondary mt-2">취소하고 돌아가기</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
