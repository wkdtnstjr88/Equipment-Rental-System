<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>システムエラーが発生しました。</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-container { text-align: center; background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        .error-icon { font-size: 5rem; color: #ff6b6b; margin-bottom: 1rem; }
        .error-title { font-weight: 700; color: #343a40; margin-bottom: 1rem; }
        .error-msg { color: #6c757d; margin-bottom: 2rem; }
        .btn-home { background-color: #0d6efd; border: none; padding: 0.8rem 2rem; font-weight: 600; border-radius: 8px; transition: 0.3s; }
        .btn-home:hover { background-color: #0b5ed7; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-icon">⚠️</div>

    <h2 class="error-title" th:text="${errorTitle != null ? errorTitle : 'システムエラー'}">システムエラー</h2>

    <p class="error-msg" th:text="${errorMessage}">現在、サービスがご利用いただけません。しばらくしてからもう一度お試しください。</p>

    <a href="/" class="btn btn-primary btn-home">トップページへ戻る</a>
</div>

</body>
</html>
