<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Equipment Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .main-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            background: white;
        }
        .welcome-header {
            background: #0d6efd;
            padding: 40px;
            color: white;
            text-align: center;
        }
        .btn-menu {
            padding: 30px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 15px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            border-width: 2px;
        }
        .btn-menu:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .menu-icon { font-size: 2.5rem; margin-bottom: 15px; }
        /* 명사 위주의 서브 텍스트 스타일 */
        .sub-text { font-size: 0.85rem; font-weight: 400; color: #6c757d; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="main-card">
                <div class="welcome-header">
                    <h1 class="fw-bold mb-2">Welcome! 🚀</h1>
                    <p class="mb-0 fs-5 fw-bold">備品貸出管理システム</p>
                    <small class="opacity-75">Equipment Rental Management</small>
                </div>

                <div class="card-body p-5">
                    <div class="row g-4">
                        <div class="col-6">
                            <a href="/equipments" class="btn btn-outline-primary btn-menu">
                                <span class="menu-icon">📦</span>
                                <span>備品貸출状況</span>
                                <span class="sub-text">在庫確認・貸出申請</span>
                            </a>
                        </div>
                        <div class="col-6">
                            <a href="/rentals/history" class="btn btn-outline-dark btn-menu">
                                <span class="menu-icon">📜</span>
                                <span>貸出履歴管理</span>
                                <span class="sub-text">返却処理・履歴確認</span>
                            </a>
                        </div>
                    </div>

                    <div class="mt-5 text-center text-muted">
                        <hr>
                        <small>© 2026 Equipment Management System. All rights reserved.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
