<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>備品貸出管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Noto Sans JP', 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding-top: 70px;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #0d6efd !important;
        }

        .welcome-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: none;
        }

        .card-header-visual {
            background: #0d6efd;
            padding: 55px 20px;
            color: white;
            text-align: center;
        }

        .menu-box {
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: block;
            background: #fff;
        }
        .menu-box:hover {
            border-color: #0d6efd;
            background: #f0f7ff;
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.08);
        }

        .btn-nav {
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 12px;
            padding: 8px 18px;
        }
        .user-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-cpu-fill me-2"></i>RENTAL
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <div class="ms-auto d-flex align-items-center gap-2">

                <th:block th:if="${session.loginMember == null}">
                    <a th:href="@{/login}" class="btn btn-light btn-nav text-primary">ログイン</a>
                    <a th:href="@{/members/add}" class="btn btn-primary btn-nav">新規登録</a>
                </th:block>

                <th:block th:if="${session.loginMember != null}">
                    <span class="user-name me-2">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${session.loginMember.name}">ユーザー</span> 様
                    </span>
                    <a th:href="@{/members/edit}" class="btn btn-outline-secondary btn-nav">個人情報管理</a>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-nav">ログアウト</button>
                    </form>
                </th:block>

            </div>
        </div>
    </div>
</nav>

<div class="welcome-card">
    <div class="card-header-visual">
        <h1 class="fw-bold mb-1">Welcome! 🚀</h1>
        <p class="mb-0 opacity-75">備品貸出管理システム</p>
        <p class="mb-0 small opacity-50">Equipment Rental Management</p>
    </div>

    <div class="card-body p-4 p-md-5">
        <div class="text-center mb-5">
            <p th:if="${session.loginMember != null}" class="fw-bold text-primary mb-1">
                ようこそ、<span th:text="${session.loginMember.name}">ユーザー</span> 様
            </p>
            <p class="text-muted small mb-0">メニューを選択して備品を管理してください。</p>
        </div>

        <div class="row g-3">
            <div class="col-6">
                <a th:href="@{/equipments}" class="menu-box">
                    <i class="bi bi-box-seam fs-1 text-primary mb-2 d-block"></i>
                    <span class="fw-bold d-block">貸出状況</span>
                </a>
            </div>
            <div class="col-6">
                <a th:href="@{/rentals/history}" class="menu-box">
                    <i class="bi bi-card-checklist fs-1 text-dark mb-2 d-block"></i>
                    <span class="fw-bold d-block">履歴管理</span>
                </a>
            </div>
        </div>

        <div class="mt-5 text-center text-muted" style="font-size: 0.75rem; letter-spacing: 0.5px;">
            © 2026 Equipment Management System.<br>All rights reserved.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
