<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장비 목록 조회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">📦 장비 렌탈 현황</h2>
        <a href="/" class="btn btn-outline-secondary">홈으로</a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4">
        <div class="col" th:each="equipment : ${equipmentList}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between border-bottom pb-2 mb-3">
                        <span class="badge bg-info text-dark" th:text="${equipment.category}">카테고리</span>
                        <span class="text-muted small">ID: <span th:text="${equipment.id}">1</span></span>
                    </div>
                    <h5 class="card-title fw-bold" th:text="${equipment.name}">장비명</h5>
                    <p class="card-text text-primary fs-5 fw-semibold">
                        일일 <span th:text="${#numbers.formatInteger(equipment.dailyPrice, 0, 'COMMA')}">50,000</span>원
                    </p>
                    <div class="bg-light p-3 rounded">
                        <p class="mb-1 small text-secondary">현재 보유 재고</p>
                        <h4 class="mb-0" th:text="${equipment.availableCount} + ' 대'">3 대</h4>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <button class="btn btn-primary w-100" th:disabled="${equipment.availableCount == 0}">
                        대여 가능 리스트 보기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
